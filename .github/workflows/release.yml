name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  version:
    name: Read version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Parse version from FyneApp.toml
        id: ver
        run: |
          VERSION=$(grep 'Version' FyneApp.toml | head -1 | sed 's/.*Version = "\(.*\)"/\1/' | tr -d ' ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building v$VERSION"

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: version
    runs-on: ${{ matrix.runner }}

    strategy:
      matrix:
        include:
          - runner: macos-15-intel
            goos: darwin
            goarch: amd64

          - runner: macos-latest
            goos: darwin
            goarch: arm64

          - runner: ubuntu-latest
            goos: linux
            goarch: amd64

          - runner: windows-latest
            goos: windows
            goarch: amd64
            ext: .exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libgl1-mesa-dev xorg-dev

      - name: Set up gcc (Windows)
        if: runner.os == 'Windows'
        run: echo "C:\msys64\mingw64\bin" >> $env:GITHUB_PATH

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        shell: bash
        run: |
          LDFLAGS="-s -w"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            LDFLAGS="$LDFLAGS -H windowsgui"
          fi
          go build -trimpath -ldflags="$LDFLAGS" \
            -o webator-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext || '' }} .

      - uses: actions/upload-artifact@v4
        with:
          name: webator-${{ matrix.goos }}-${{ matrix.goarch }}
          path: webator-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext || '' }}

  release:
    name: Create Release
    needs: [version, build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: actions/checkout@v4

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: v${{ needs.version.outputs.version }}
          files: dist/*
          generate_release_notes: true
