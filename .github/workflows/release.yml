name: Release
on:
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  version:
    name: Read version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Parse version from FyneApp.toml
        id: ver
        run: |
          VERSION=$(grep 'Version' FyneApp.toml | head -1 | sed 's/.*Version = "\(.*\)"/\1/' | tr -d ' ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building v$VERSION"
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: version
    runs-on: ${{ matrix.runner }}
    env:
      VERSION: ${{ needs.version.outputs.version }}
    strategy:
      matrix:
        include:
          - runner: macos-15-intel
            goos: darwin
            goarch: amd64
          - runner: macos-latest
            goos: darwin
            goarch: arm64
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - runner: windows-latest
            goos: windows
            goarch: amd64
            ext: .exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev libgtk-3-dev pkg-config libwebkit2gtk-4.1-dev
          WEBKIT_PKGDIR=$(pkg-config --variable pc_path pkg-config | tr ':' '\n' | while read -r dir; do [ -f "$dir/webkit2gtk-4.1.pc" ] && echo "$dir" && break; done)
          if [ -n "$WEBKIT_PKGDIR" ] && [ ! -f "$WEBKIT_PKGDIR/webkit2gtk-4.0.pc" ]; then
            echo "Creating pkg-config alias webkit2gtk-4.0.pc -> webkit2gtk-4.1.pc"
            sudo ln -sf "$WEBKIT_PKGDIR/webkit2gtk-4.1.pc" "$WEBKIT_PKGDIR/webkit2gtk-4.0.pc"
          fi
      - name: Set up gcc (Windows)
        if: runner.os == 'Windows'
        run: echo "C:\msys64\mingw64\bin" >> $env:GITHUB_PATH
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        shell: bash
        run: |
          LDFLAGS="-s -w"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            LDFLAGS="$LDFLAGS -H windowsgui"
          fi
          go build -trimpath -ldflags="$LDFLAGS" \
            -o webator-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext || '' }} .
      - name: Create dist directory
        shell: bash
        run: mkdir -p dist
      - name: Move build output into dist
        shell: bash
        run: mv webator-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext || '' }} dist/
      - name: Compute SHA256 and record metadata
        shell: bash
        env:
          BINARY: webator-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext || '' }}
          VERSION: ${{ env.VERSION }}
        run: |
          python - <<'PY'
          import hashlib, os, pathlib
          binary = pathlib.Path('dist') / os.environ['BINARY']
          digest = hashlib.sha256(binary.read_bytes()).hexdigest()
          summary = [
              f'Binary: {binary.name}',
              f'SHA256: {digest}',
              f'Version: {os.environ["VERSION"]}',
              f'Source: https://github.com/{os.environ["GITHUB_REPOSITORY"]}/tree/v{os.environ["VERSION"]}',
              'VirusTotal: not uploaded (VIRUSTOTAL_API_KEY not configured)',
          ]
          text = '\n'.join(summary) + '\n'
          (binary.parent / f'{binary.name}.vt-summary.txt').write_text(text)
          (binary.parent / f'{binary.name}.sha256').write_text(digest + '\n')
          print(text)
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: webator-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/webator-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext || '' }}
            dist/webator-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext || '' }}.vt-summary.txt

  virustotal:
    name: Upload to VirusTotal
    needs: [version, build]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Upload binary to VirusTotal
        env:
          VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
          VERSION: ${{ needs.version.outputs.version }}
        shell: bash
        run: |
          if [ -z "$VIRUSTOTAL_API_KEY" ]; then
            echo "VIRUSTOTAL_API_KEY not configured; skipping VirusTotal upload"
            exit 0
          fi

          for binary in dist/webator-*; do
            if [[ "$binary" == *.sha256 ]] || [[ "$binary" == *.vt-summary.txt ]]; then
              continue
            fi
            if [ ! -f "$binary" ]; then
              continue
            fi
            echo "Uploading $binary to VirusTotal"
            BINARY="$binary" python - <<'PY'
            import hashlib, json, os, pathlib, time, urllib.request, uuid

            binary = pathlib.Path(os.environ['BINARY'])
            api_key = os.environ['VIRUSTOTAL_API_KEY']
            sha256 = hashlib.sha256(binary.read_bytes()).hexdigest()
            boundary = uuid.uuid4().hex
            body = b'--' + boundary.encode() + b'\r\n'
            body += f'Content-Disposition: form-data; name="file"; filename="{binary.name}"\r\n'.encode()
            body += b'Content-Type: application/octet-stream\r\n\r\n'
            body += binary.read_bytes() + b'\r\n'
            body += b'--' + boundary.encode() + b'--\r\n'

            req = urllib.request.Request(
                'https://www.virustotal.com/api/v3/files',
                data=body,
                headers={
                    'x-apikey': api_key,
                    'Content-Type': f'multipart/form-data; boundary={boundary}',
                },
            )
            with urllib.request.urlopen(req) as resp:
                upload = json.load(resp)
            analysis_id = upload['data']['id']

            for attempt in range(30):
                if attempt:
                    time.sleep(5)
                req = urllib.request.Request(
                    f'https://www.virustotal.com/api/v3/analyses/{analysis_id}',
                    headers={'x-apikey': api_key},
                )
                with urllib.request.urlopen(req) as resp:
                    analysis = json.load(resp)
                status = analysis['data']['attributes']['status']
                print(f'Analysis status: {status}')
                if status == 'completed':
                    break
            else:
                raise SystemExit('VirusTotal analysis did not complete within the allotted time')

            req = urllib.request.Request(
                f'https://www.virustotal.com/api/v3/files/{sha256}',
                headers={'x-apikey': api_key},
            )
            with urllib.request.urlopen(req) as resp:
                metadata = json.load(resp)

            stats = metadata['data']['attributes'].get('last_analysis_stats', {})
            total = sum(stats.values())
            positives = stats.get('malicious', 0)
            vt_url = f'https://www.virustotal.com/gui/file/{sha256}/detection'

            summary = [
                f'Binary: {binary.name}',
                f'SHA256: {sha256}',
                f'Version: {os.environ["VERSION"]}',
                f'Source: https://github.com/{os.environ["GITHUB_REPOSITORY"]}/tree/v{os.environ["VERSION"]}',
                f'VirusTotal upload: {vt_url}',
                f'Analysis ID: {analysis_id}',
                f'Positives: {positives}/{total}',
            ]
            text = '\n'.join(summary) + '\n'
            (binary.parent / f'{binary.name}.vt-summary.txt').write_text(text)
            print(text)
            PY
          done

  release:
    name: Create Release
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: v${{ needs.version.outputs.version }}
          files: dist/*
          generate_release_notes: true
